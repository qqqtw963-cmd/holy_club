<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HolyClub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <div class="badge">HOLYCLUB</div>
        <h1>하나님과 더 가까워지는 거룩한 습관</h1>
        <p>
          말씀, 기도, 루틴, 기록을 통해 매일의 신앙을 함께 세워가는 HolyClub.
        </p>
        <div class="actions">
          <a href="https://api.holyclub.co.kr/openapi.json/" class="btn outline">API 보기</a>
          <a href="#" class="btn">앱 준비중</a>
        </div>
      </section>

      <section class="section">
        <h2>서비스 소개</h2>
        <p>
          HolyClub은 성경 읽기, 기도, 신앙 루틴, 기록 기능을 통해
          일상의 믿음을 지속하도록 돕는 서비스입니다.
        </p>
      </section>

      <section class="section">
        <h2>현재 상태</h2>
        <ul>
          <li>메인 사이트 준비 중</li>
          <li>백엔드 API 운영 중</li>
          <li>관리자 페이지 준비 중</li>
        </ul>
      </section>
    </main>
  </body>
</html>
