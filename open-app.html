<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HolyClub 앱 열기</title>
  <meta name="description" content="HolyClub 앱을 바로 열거나 설치 안내로 이어지는 브릿지 페이지입니다.">
  <style>
    :root {
      --bg: #f4f8fc;
      --surface: rgba(255,255,255,0.86);
      --surface-strong: #ffffff;
      --line: rgba(26,58,87,0.12);
      --text: #132433;
      --text-muted: #5d7284;
      --brand: #4d90cf;
      --brand-deep: #225d95;
      --brand-ink: #15314a;
      --shadow: 0 30px 90px -44px rgba(21, 49, 80, 0.45);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(169, 204, 238, 0.35), transparent 28%),
        radial-gradient(circle at top right, rgba(210, 228, 246, 0.5), transparent 30%),
        linear-gradient(180deg, #f7fbff 0%, #f4f8fc 100%);
    }

    .shell {
      width: min(680px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(246,250,255,0.92));
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 6vw, 44px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(77, 144, 207, 0.09);
      color: var(--brand-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.24;
      letter-spacing: -0.03em;
      color: var(--brand-ink);
      font-family: 'Gowun Batang', 'Apple SD Gothic Neo', serif;
    }

    p {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(15px, 2.2vw, 18px);
      line-height: 1.85;
    }

    .target-card {
      margin-top: 26px;
      padding: 18px 18px 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--surface-strong);
      display: grid;
      gap: 8px;
    }

    .target-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .target-card strong {
      font-size: 24px;
      line-height: 1.35;
      color: var(--brand-ink);
    }

    .deep-link {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      margin-top: 4px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(34, 93, 149, 0.08);
      color: var(--brand-deep);
      font-size: 13px;
      font-weight: 700;
      word-break: break-all;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 26px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .button:hover { transform: translateY(-1px); }

    .button-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      box-shadow: 0 18px 34px -18px rgba(34, 93, 149, 0.8);
    }

    .button-secondary {
      color: var(--brand-deep);
      background: rgba(255,255,255,0.76);
      border-color: rgba(34, 93, 149, 0.12);
    }

    .helper {
      margin-top: 18px;
      font-size: 14px;
      color: var(--text-soft, #7c8f9f);
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      margin-top: 22px;
    }

    .footer-links a {
      color: var(--brand-deep);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .shell { border-radius: 24px; padding: 24px 18px; }
      .target-card strong { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="eyebrow">HolyClub App Bridge</div>
    <h1 id="title">HolyClub 앱을 여는 중입니다</h1>
    <p id="description">앱이 설치되어 있다면 바로 열리고, 아직 설치 전이라면 설치·출시 안내로 이어집니다.</p>

    <section class="target-card" aria-label="앱 연결 정보">
      <span class="target-label" id="targetLabel">HOME</span>
      <strong id="targetName">앱 홈 열기</strong>
      <span class="deep-link" id="deepLinkText">holyclub://home</span>
    </section>

    <div class="actions">
      <a class="button button-primary" id="openButton" href="holyclub://home">앱 열기 다시 시도</a>
      <a class="button button-secondary" id="fallbackButton" href="index.html#start">설치 · 출시 안내 보기</a>
    </div>

    <p class="helper" id="helperText">모바일에서는 자동으로 앱 열기를 먼저 시도합니다. PC에서는 안내 화면으로 남아 있습니다.</p>

    <div class="footer-links">
      <a href="index.html">랜딩으로 돌아가기</a>
      <a href="index.html#app-connect">다른 앱 연결 보기</a>
      <a href="index.html#features">핵심 기능 보기</a>
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const target = params.get('target') || 'home';
      const targets = {
        home: {
          label: 'HOME',
          title: '앱 홈 열기',
          description: '오늘의 루틴과 말씀 흐름이 모인 첫 화면으로 바로 이동합니다.',
          deepLink: 'holyclub://home?source=landing',
        },
        'prayer-timer': {
          label: 'PRAYER TIMER',
          title: '기도 루틴 바로 시작',
          description: '기도 타이머 화면으로 이동해 짧은 기도 루틴을 바로 이어갈 수 있습니다.',
          deepLink: 'holyclub://prayer/timer?source=landing',
        },
        profile: {
          label: 'PROFILE',
          title: '내 기록 흐름 열기',
          description: '프로필과 저녁 흐름 쪽으로 이동해 쌓인 기록과 루틴을 다시 확인합니다.',
          deepLink: 'holyclub://profile?source=landing',
        },
      };

      const selected = targets[target] || targets.home;
      const fallbackUrl = 'index.html#start';
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || '');

      document.getElementById('title').textContent = selected.title;
      document.getElementById('description').textContent = selected.description;
      document.getElementById('targetLabel').textContent = selected.label;
      document.getElementById('targetName').textContent = selected.title;
      document.getElementById('deepLinkText').textContent = selected.deepLink.replace('?source=landing', '');
      document.getElementById('openButton').href = selected.deepLink;
      document.getElementById('fallbackButton').href = fallbackUrl;
      document.getElementById('helperText').textContent = isMobile
        ? '모바일에서는 자동으로 앱 열기를 먼저 시도합니다. 앱이 없으면 설치·출시 안내로 이어집니다.'
        : 'PC에서는 앱이 자동 실행되지 않을 수 있습니다. 모바일에서 다시 열거나 설치·출시 안내를 확인해 주세요.';

      let fallbackTimer = null;
      const tryOpen = () => {
        if (!isMobile) return;
        fallbackTimer = window.setTimeout(() => {
          window.location.replace(fallbackUrl);
        }, 1600);
        window.location.href = selected.deepLink;
      };

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden' && fallbackTimer) {
          window.clearTimeout(fallbackTimer);
        }
      });

      window.addEventListener('pagehide', () => {
        if (fallbackTimer) window.clearTimeout(fallbackTimer);
      });

      window.setTimeout(tryOpen, 280);
    })();
  </script>
</body>
</html>
